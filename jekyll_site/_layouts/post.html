---
layout: base
---
<div class="post-header-zone">
  <div class="wrap">
    <a href="{{ site.baseurl }}/posts/" class="post-back-link">← All posts</a>
    <h1 class="post-title" itemprop="name">{{ page.title }}</h1>
    <div class="post-dateline">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.last_modified and page.last_modified != page.date %}
        · Updated {{ page.last_modified | date: "%B %-d, %Y" }}
      {% endif %}
    </div>
  </div>
</div>
<div class="wrap" style="padding-bottom:4rem" itemscope itemtype="http://schema.org/BlogPosting">
  <div class="prose">
    {{ content }}
  </div>
</div>

---
layout: base
---
<div class="wrap" style="padding-top:2.5rem;padding-bottom:4rem">
  <div itemscope itemtype="http://schema.org/BlogPosting">
    <div style="margin-bottom:2rem">
      <a href="{{ site.baseurl }}/posts/" style="font-family:var(--mono);font-size:0.8rem;color:var(--text-2);text-decoration:none">← All posts</a>
      <h1 style="font-size:clamp(1.75rem,4vw,2.75rem);font-weight:800;letter-spacing:-0.03em;margin:0.75rem 0 0.4rem;color:var(--text)">{{ page.title }}</h1>
      <div style="font-family:var(--mono);font-size:0.8rem;color:var(--text-2)">
        {{ page.date | date: "%B %-d, %Y" }}
        {% if page.last_modified and page.last_modified != page.date %}
          · Updated {{ page.last_modified | date: "%B %-d, %Y" }}
        {% endif %}
      </div>
    </div>
    <div class="prose">
      {{ content }}
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | Majorsilence Reporting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/bundle.css?v={{site.siteversion}}" />
  {% if page.enable_syntax_highlighting %}
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/style.css?v={{site.siteversion}}" />
  {% endif %}
  {% include opengraph.html %}
</head>
<body>
  {% include page_header.html %}
  <main>
    {{ content | replace: '<img', '<img loading="lazy"' }}
  </main>
  {% include footer.html %}
  <script defer src="{{site.baseurl}}/assets/js/bundle.js?v={{site.siteversion}}"></script>
  <script>
    // Tab switcher for code examples
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tabs').forEach(function (tabGroup) {
        tabGroup.querySelectorAll('.tab-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var target = btn.dataset.tab;
            var parent = tabGroup.closest('.tab-container');
            tabGroup.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            parent.querySelectorAll('.tab-pane').forEach(function (p) {
              p.classList.toggle('active', p.dataset.tab === target);
            });
          });
        });
      });
    });
  </script>
</body>
</html>
